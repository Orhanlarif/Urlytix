# Render Blueprint — Urlytix API
# Dashboard: New → Blueprint → bu repo
# Free plan; env secret'ları Render UI'dan doldurulur.

services:
  - type: web
    name: urlytix-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    # Avoid `corepack enable` on Render — it tries to write /usr/bin/pnpm (EROFS).
    # --prod=false: prisma + @nestjs/cli live in api devDependencies; needed at build.
    buildCommand: >-
      npm install -g pnpm@9.15.9 &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter api exec prisma generate &&
      pnpm --filter api exec prisma migrate deploy &&
      pnpm --filter api build
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Do not set PORT — Render injects it; hardcoding 4000 breaks the proxy.
      - key: BILLING_ENABLED
        value: 'false'
      - key: CORS_ORIGINS
        value: https://urlytix.com,https://www.urlytix.com
      - key: APP_WEB_URL
        value: https://urlytix.com
      - key: SHORT_URL_BASE
        value: https://go.urlytix.com
      - key: COOKIE_DOMAIN
        value: .urlytix.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_SECURE
        value: 'false'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
