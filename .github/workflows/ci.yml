name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urlytics
          POSTGRES_PASSWORD: urlytics_password
          POSTGRES_DB: urlytics_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U urlytics -d urlytics_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://urlytics:urlytics_password@localhost:5432/urlytics_db
      JWT_SECRET: ci_test_jwt_secret_key_minimum_32_chars
      SHORT_URL_BASE: http://localhost:4000/api/r
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Run database migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm --filter api test

      - name: E2E tests
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm build
