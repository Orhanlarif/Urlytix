openapi: 3.1.0
info:
  title: Urlytics API
  version: 0.1.0
  description: |
    Contract for implemented and planned Urlytics endpoints. Operations marked
    `x-urlytics-status: planned` are design targets and are not available yet.
    All paths are relative to the NestJS `/api` global prefix.
servers:
  - url: https://api.example.invalid/api
    description: Replace with the environment API origin
tags:
  - name: System
  - name: Auth
  - name: Links
  - name: Analytics
  - name: Settings
  - name: Workspaces
  - name: Billing
  - name: API keys
  - name: Webhooks
  - name: Domains
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Check API and database readiness
      x-urlytics-status: implemented
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a user
      x-urlytics-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate a user
      x-urlytics-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "201":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the current user
      x-urlytics-status: implemented
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      summary: Rotate a refresh token and issue a new access token
      x-urlytics-status: implemented
      security:
        - refreshCookie: []
      responses:
        "201":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the active refresh-token family
      x-urlytics-status: implemented
      security:
        - refreshCookie: []
      responses:
        "201":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /links:
    get:
      tags: [Links]
      operationId: listLinks
      summary: List links owned by the current user
      x-urlytics-status: implemented
      responses:
        "200":
          description: Links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Link"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Links]
      operationId: createLink
      summary: Create a short link
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /links/{linkId}:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    get:
      tags: [Links]
      operationId: getLink
      summary: Get an owned link
      x-urlytics-status: implemented
      responses:
        "200":
          description: Link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Links]
      operationId: updateLink
      summary: Update an owned link
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Links]
      operationId: deleteLink
      summary: Delete an owned link
      x-urlytics-status: implemented
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/{linkId}/status:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    patch:
      tags: [Links]
      operationId: updateLinkStatus
      summary: Change link status
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkStatusRequest"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /r/{shortCode}:
    get:
      tags: [Links]
      operationId: redirectShortLink
      summary: Resolve and track a short link
      x-urlytics-status: implemented
      security: []
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
      responses:
        "302":
          description: Redirect to destination
          headers:
            Location:
              schema:
                type: string
                format: uri
        "404":
          description: Link not found
          content:
            text/html:
              schema:
                type: string
        "410":
          description: Link disabled or expired
          content:
            text/html:
              schema:
                type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /analytics/overview:
    get:
      tags: [Analytics]
      operationId: getAnalyticsOverview
      summary: Get dashboard analytics
      x-urlytics-status: implemented
      responses:
        "200":
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /analytics/links/{linkId}:
    get:
      tags: [Analytics]
      operationId: getLinkAnalytics
      summary: Get analytics for an owned link
      x-urlytics-status: implemented
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "200":
          description: Link analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkAnalytics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/profile:
    patch:
      tags: [Settings]
      operationId: updateProfile
      summary: Update current user profile
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: [string, "null"]
                  maxLength: 80
                email:
                  type: string
                  format: email
                timezone:
                  type: string
                  maxLength: 50
                locale:
                  type: string
                  maxLength: 10
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /settings/password:
    put:
      tags: [Settings]
      operationId: changePassword
      summary: Change password and revoke other sessions
      x-urlytics-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  minLength: 6
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        "204":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /settings/account:
    delete:
      tags: [Settings]
      operationId: deleteAccount
      summary: Schedule account deletion
      x-urlytics-status: planned
      responses:
        "202":
          description: Deletion scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces for the current user
      x-urlytics-status: implemented
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a workspace
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, slug]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: "^[a-z0-9-]+$"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"

  /workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get a workspace
      x-urlytics-status: implemented
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      operationId: updateWorkspace
      summary: Update a workspace
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 80
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Workspaces]
      operationId: deleteWorkspace
      summary: Delete a workspace
      x-urlytics-status: planned
      responses:
        "204":
          description: Workspace deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/members:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceMembers
      summary: List workspace members
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Workspaces]
      operationId: addWorkspaceMember
      summary: Add an existing user to a workspace
      x-urlytics-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/invitations:
    post:
      tags: [Workspaces]
      operationId: inviteWorkspaceMember
      summary: Invite a workspace member
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "202":
          description: Invitation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /billing/plans:
    get:
      tags: [Billing]
      operationId: listBillingPlans
      summary: List available plans
      x-urlytics-status: implemented
      security: []
      responses:
        "200":
          description: Billing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /billing/workspaces/{workspaceId}/subscription:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Billing]
      operationId: getSubscription
      summary: Get workspace subscription and entitlements
      x-urlytics-status: implemented
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Billing]
      operationId: changeSubscriptionPlan
      summary: Change the workspace plan
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [planCode]
              properties:
                planCode:
                  type: string
                  minLength: 1
                  maxLength: 50
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/checkout:
    post:
      tags: [Billing]
      operationId: createCheckout
      summary: Create a hosted checkout session
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro, business]
      responses:
        "201":
          description: Checkout session
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/portal:
    post:
      tags: [Billing]
      operationId: createBillingPortal
      summary: Create a hosted billing portal session
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "201":
          description: Portal session
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/provider-webhook:
    post:
      tags: [Billing]
      operationId: receiveBillingProviderWebhook
      summary: Receive a signed billing-provider event
      description: The implementation must verify the signature against the raw body.
      x-urlytics-status: planned
      security: []
      parameters:
        - name: Provider-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Event accepted or already processed
        "400":
          $ref: "#/components/responses/BadRequest"

  /workspaces/{workspaceId}/api-keys:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [API keys]
      operationId: listApiKeys
      summary: List workspace API-key metadata
      x-urlytics-status: implemented
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      tags: [API keys]
      operationId: createApiKey
      summary: Create a workspace API key
      description: The plaintext secret is returned exactly once.
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    required: [secret]
                    properties:
                      secret:
                        type: string

  /workspaces/{workspaceId}/api-keys/{apiKeyId}:
    delete:
      tags: [API keys]
      operationId: revokeApiKey
      summary: Revoke an API key
      x-urlytics-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: apiKeyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: API key revoked
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/webhooks:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List workspace webhook subscriptions
      x-urlytics-status: implemented
      responses:
        "200":
          description: Webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create a webhook subscription
      description: The signing secret is returned exactly once.
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      [
                        link.created,
                        link.updated,
                        link.deleted,
                        subscription.updated,
                      ]
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Webhook"
                  - type: object
                    required: [signingSecret]
                    properties:
                      signingSecret:
                        type: string

  /workspaces/{workspaceId}/webhooks/{webhookId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/WebhookId"
    patch:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update a webhook subscription
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                active:
                  type: boolean
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook subscription
      x-urlytics-status: implemented
      responses:
        "204":
          description: Webhook deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/webhooks/{webhookId}/deliveries:
    get:
      tags: [Webhooks]
      operationId: listWebhookDeliveries
      summary: List recent webhook deliveries
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/WebhookId"
      responses:
        "200":
          description: Deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookDelivery"

  /workspaces/{workspaceId}/webhooks/{webhookId}/deliveries/{deliveryId}/retry:
    post:
      tags: [Webhooks]
      operationId: retryWebhookDelivery
      summary: Queue a failed delivery for retry
      x-urlytics-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/WebhookId"
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Retry queued
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/domains:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Domains]
      operationId: listDomains
      summary: List branded domains
      x-urlytics-status: implemented
      responses:
        "200":
          description: Workspace domains
    post:
      tags: [Domains]
      operationId: createDomain
      summary: Register a branded domain
      x-urlytics-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname:
                  type: string
                  format: hostname
      responses:
        "201":
          description: Domain registered
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/domains/{domainId}/verify:
    post:
      tags: [Domains]
      operationId: verifyDomain
      summary: Verify a branded domain TXT record
      x-urlytics-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Verification result

  /workspaces/{workspaceId}/domains/{domainId}:
    delete:
      tags: [Domains]
      operationId: deleteDomain
      summary: Remove a branded domain
      x-urlytics-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Domain removed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  parameters:
    LinkId:
      name: linkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    WebhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated principal lacks permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource state conflicts with the request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Service dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Health"

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, app, database, timestamp]
      properties:
        status:
          type: string
          enum: [ok, error]
        app:
          type: string
          const: Urlytics API
        database:
          type: string
          enum: [connected, disconnected]
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          minimum: 400
          maximum: 599
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      additionalProperties: false
      required: [message, accessToken, refreshToken, user]
      properties:
        message:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    TokenResponse:
      type: object
      additionalProperties: false
      required: [accessToken]
      properties:
        accessToken:
          type: string

    User:
      type: object
      additionalProperties: false
      required: [id, email, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: [string, "null"]
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    LinkStatus:
      type: string
      enum: [ACTIVE, DISABLED, EXPIRED]

    CreateLinkRequest:
      type: object
      additionalProperties: false
      required: [originalUrl]
      properties:
        originalUrl:
          type: string
          format: uri
        title:
          type: string
          maxLength: 80
        customAlias:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[a-zA-Z0-9_-]+$"
        expiresAt:
          type: string
          format: date-time

    UpdateLinkRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        originalUrl:
          type: string
          format: uri
        title:
          type: string
          maxLength: 80
        expiresAt:
          type: [string, "null"]
          format: date-time

    UpdateLinkStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/LinkStatus"

    Link:
      type: object
      required: [id, originalUrl, shortCode, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        originalUrl:
          type: string
          format: uri
        shortCode:
          type: string
        shortUrl:
          type: string
          format: uri
        title:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/LinkStatus"
        expiresAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DailyClicks:
      type: object
      additionalProperties: false
      required: [date, clicks]
      properties:
        date:
          type: string
          format: date
        clicks:
          type: integer
          minimum: 0

    GroupedCount:
      type: object
      additionalProperties: false
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
          minimum: 0

    Click:
      type: object
      required: [id, clickedAt, deviceType, isBot]
      properties:
        id:
          type: string
          format: uuid
        clickedAt:
          type: string
          format: date-time
        country:
          type: [string, "null"]
        city:
          type: [string, "null"]
        deviceType:
          type: string
          enum: [DESKTOP, MOBILE, TABLET, BOT, UNKNOWN]
        browser:
          type: [string, "null"]
        os:
          type: [string, "null"]
        referrer:
          type: [string, "null"]
        utmSource:
          type: [string, "null"]
        utmMedium:
          type: [string, "null"]
        utmCampaign:
          type: [string, "null"]
        isBot:
          type: boolean

    AnalyticsOverview:
      type: object
      required:
        [
          totalLinks,
          totalClicks,
          clicksToday,
          dailyClicks,
          topLinks,
          recentClicks,
        ]
      properties:
        totalLinks:
          type: integer
          minimum: 0
        totalClicks:
          type: integer
          minimum: 0
        clicksToday:
          type: integer
          minimum: 0
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClicks"
        topLinks:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Link"
              - type: object
                properties:
                  totalClicks:
                    type: integer
                    minimum: 0
        recentClicks:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Click"
              - type: object
                properties:
                  link:
                    $ref: "#/components/schemas/Link"

    LinkAnalytics:
      type: object
      required:
        - link
        - uniqueVisitors
        - dailyClicks
        - deviceStats
        - browserStats
        - osStats
        - referrerStats
        - utmSourceStats
        - botStats
        - recentClicks
      properties:
        link:
          allOf:
            - $ref: "#/components/schemas/Link"
            - type: object
              properties:
                totalClicks:
                  type: integer
                  minimum: 0
        uniqueVisitors:
          type: integer
          minimum: 0
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClicks"
        deviceStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        browserStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        osStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        referrerStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        utmSourceStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        botStats:
          type: object
          additionalProperties: false
          required: [botClicks, humanClicks]
          properties:
            botClicks:
              type: integer
              minimum: 0
            humanClicks:
              type: integer
              minimum: 0
        recentClicks:
          type: array
          items:
            $ref: "#/components/schemas/Click"

    WorkspaceRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]

    Workspace:
      type: object
      additionalProperties: false
      required: [id, name, slug, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time

    WorkspaceMember:
      type: object
      additionalProperties: false
      required: [user, role, joinedAt]
      properties:
        user:
          $ref: "#/components/schemas/User"
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        joinedAt:
          type: string
          format: date-time

    Subscription:
      type: object
      additionalProperties: false
      required: [plan, status, currentPeriodEnd]
      properties:
        plan:
          type: string
          enum: [free, pro, business]
        status:
          type: string
          enum: [active, trialing, past_due, canceled, incomplete]
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean

    ApiKey:
      type: object
      additionalProperties: false
      required: [id, name, prefix, scopes, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    Webhook:
      type: object
      additionalProperties: false
      required: [id, url, events, active, createdAt]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      additionalProperties: false
      required: [id, event, status, attempts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        event:
          type: string
        status:
          type: string
          enum: [pending, delivered, failed, dead_letter]
        attempts:
          type: integer
          minimum: 0
        responseStatus:
          type: [integer, "null"]
        nextAttemptAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

security:
  - bearerAuth: []
