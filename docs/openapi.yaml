openapi: 3.1.0
info:
  title: Urlytix API
  version: 0.1.0
  description: |
    Contract for implemented and planned Urlytix endpoints. Operations marked
    `x-urlytix-status: planned` are design targets and are not available yet.
    Billing is retained for a later phase and its implemented routes return 404
    unless the server is explicitly started with `BILLING_ENABLED=true`.
    Registering a user atomically provisions an OWNER default workspace.
    Browser sessions use API-managed httpOnly `access_token` (15 minutes) and
    rotating `refresh_token` (30 days) cookies; bearer JWTs remain supported.
    All paths are relative to the NestJS `/api` global prefix.
servers:
  - url: https://api.example.invalid/api
    description: Replace with the environment API origin
tags:
  - name: System
  - name: Auth
  - name: Links
  - name: Analytics
  - name: Settings
  - name: Workspaces
  - name: Billing
  - name: API keys
  - name: Webhooks
  - name: Domains
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Check API and database readiness
      x-urlytix-status: implemented
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a user
      description: Creates the user, an OWNER default workspace, and a refresh session.
      x-urlytix-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate a user
      x-urlytix-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "201":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the current user
      x-urlytix-status: implemented
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      summary: Rotate a refresh token and issue a new access token
      x-urlytix-status: implemented
      security:
        - refreshCookie: []
      responses:
        "201":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the active refresh-token family
      x-urlytix-status: implemented
      security:
        - refreshCookie: []
      responses:
        "201":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /links:
    get:
      tags: [Links]
      operationId: listLinks
      summary: List links in a workspace
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdQuery"
      responses:
        "200":
          description: Links
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Link"
                  meta:
                    type: object
                    required: [page, pageSize, total, totalPages]
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Links]
      operationId: createLink
      summary: Create a short link
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /links/{linkId}:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    get:
      tags: [Links]
      operationId: getLink
      summary: Get an owned link
      x-urlytix-status: implemented
      responses:
        "200":
          description: Link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Links]
      operationId: updateLink
      summary: Update an owned link
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Links]
      operationId: deleteLink
      summary: Delete an owned link
      x-urlytix-status: implemented
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/{linkId}/status:
    parameters:
      - $ref: "#/components/parameters/LinkId"
    patch:
      tags: [Links]
      operationId: updateLinkStatus
      summary: Change link status
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkStatusRequest"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /r/{shortCode}:
    get:
      tags: [Links]
      operationId: redirectShortLink
      summary: Resolve and track a short link
      description: |
        Public short links are advertised as `/{shortCode}` on the API host
        (for example `https://go.example.com/abc1234`). That path is rewritten
        to this handler. The `/api/r/{shortCode}` form remains supported.
      x-urlytix-status: implemented
      security: []
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
      responses:
        "302":
          description: Redirect to destination
          headers:
            Location:
              schema:
                type: string
                format: uri
        "401":
          description: Password-protected link requires unlocking
          content:
            text/html:
              schema:
                type: string
        "403":
          description: Link is disabled
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Link not found
          content:
            text/html:
              schema:
                type: string
        "410":
          description: Link expired
          content:
            text/html:
              schema:
                type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Links]
      operationId: unlockPasswordProtectedLink
      summary: Verify a protected-link password and redirect
      description: Limited to 5 attempts per minute per throttling identity.
      x-urlytix-status: implemented
      security: []
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockLinkRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/UnlockLinkRequest"
      responses:
        "302":
          description: Password accepted; redirect to destination
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Password is required or invalid
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Link not found
          content:
            text/html:
              schema:
                type: string
        "410":
          description: Link expired
          content:
            text/html:
              schema:
                type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /analytics/overview:
    get:
      tags: [Analytics]
      operationId: getAnalyticsOverview
      summary: Get dashboard analytics for a workspace
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdQuery"
      responses:
        "200":
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /analytics/links/{linkId}:
    get:
      tags: [Analytics]
      operationId: getLinkAnalytics
      summary: Get analytics for an owned link
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "200":
          description: Link analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkAnalytics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/profile:
    patch:
      tags: [Settings]
      operationId: updateProfile
      summary: Update current user profile
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: [string, "null"]
                  maxLength: 80
                email:
                  type: string
                  format: email
                timezone:
                  type: string
                  maxLength: 50
                locale:
                  type: string
                  maxLength: 10
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request a password reset email
      x-urlytix-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: Generic acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password with emailed token
      x-urlytix-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        "201":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/change-password:
    post:
      tags: [Auth]
      operationId: changePassword
      summary: Change password and revoke other sessions
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        "201":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sessions:
    get:
      tags: [Auth]
      operationId: listSessions
      summary: List active refresh sessions
      x-urlytix-status: implemented
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Auth]
      operationId: revokeOtherSessions
      summary: Revoke all sessions except the current one
      x-urlytix-status: implemented
      responses:
        "200":
          description: Other sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sessions/{sessionId}:
    delete:
      tags: [Auth]
      operationId: revokeSession
      summary: Revoke a single session
      x-urlytix-status: implemented
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/2fa/setup:
    post:
      tags: [Auth]
      operationId: setupTwoFactor
      summary: Begin TOTP setup
      x-urlytix-status: implemented
      responses:
        "201":
          description: Setup payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [secret, otpauthUrl, qrCodeDataUrl]
                properties:
                  secret:
                    type: string
                  otpauthUrl:
                    type: string
                  qrCodeDataUrl:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/enable:
    post:
      tags: [Auth]
      operationId: enableTwoFactor
      summary: Enable TOTP after verifying a code
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^\\d{6}$"
      responses:
        "201":
          description: Enabled with one-time backup codes
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [message, backupCodes]
                properties:
                  message:
                    type: string
                  backupCodes:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/disable:
    post:
      tags: [Auth]
      operationId: disableTwoFactor
      summary: Disable TOTP with password and code
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [password, code]
              properties:
                password:
                  type: string
                code:
                  type: string
      responses:
        "201":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/verify:
    post:
      tags: [Auth]
      operationId: verifyTwoFactor
      summary: Complete login with TOTP or backup code
      x-urlytix-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [twoFactorToken, code]
              properties:
                twoFactorToken:
                  type: string
                code:
                  type: string
      responses:
        "201":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /settings/account:
    delete:
      tags: [Settings]
      operationId: deleteAccount
      summary: Schedule account deletion
      x-urlytix-status: planned
      responses:
        "202":
          description: Deletion scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces for the current user
      x-urlytix-status: implemented
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a workspace
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, slug]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: "^[a-z0-9-]+$"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"

  /workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get a workspace
      x-urlytix-status: implemented
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      operationId: updateWorkspace
      summary: Update a workspace
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Workspaces]
      operationId: deleteWorkspace
      summary: Delete a workspace owned by the current user
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [confirmSlug]
              properties:
                confirmSlug:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/members:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceMembers
      summary: List workspace members
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Workspaces]
      operationId: addWorkspaceMember
      summary: Add an existing user to a workspace
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Workspaces]
      operationId: updateWorkspaceMemberRole
      summary: Update a workspace member role
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role]
              properties:
                role:
                  type: string
                  enum: [ADMIN, MEMBER, VIEWER]
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Workspaces]
      operationId: removeWorkspaceMember
      summary: Remove a workspace member
      x-urlytix-status: implemented
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/invitations:
    post:
      tags: [Workspaces]
      operationId: inviteWorkspaceMember
      summary: Invite a workspace member
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "202":
          description: Invitation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /billing/plans:
    get:
      tags: [Billing]
      operationId: listBillingPlans
      summary: List available plans
      x-urlytix-status: disabled-by-default
      security: []
      responses:
        "200":
          description: Billing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        "404":
          description: Billing is disabled for the free first phase

  /billing/workspaces/{workspaceId}/subscription:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Billing]
      operationId: getSubscription
      summary: Get workspace subscription and entitlements
      x-urlytix-status: disabled-by-default
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: Billing is disabled or the subscription was not found
    patch:
      tags: [Billing]
      operationId: changeSubscriptionPlan
      summary: Change the workspace plan
      x-urlytix-status: disabled-by-default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [planCode]
              properties:
                planCode:
                  type: string
                  minLength: 1
                  maxLength: 50
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Billing is disabled for the free first phase

  /billing/checkout:
    post:
      tags: [Billing]
      operationId: createCheckout
      summary: Create a hosted checkout session
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro, business]
      responses:
        "201":
          description: Checkout session
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/portal:
    post:
      tags: [Billing]
      operationId: createBillingPortal
      summary: Create a hosted billing portal session
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceHeader"
      responses:
        "201":
          description: Portal session
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/provider-webhook:
    post:
      tags: [Billing]
      operationId: receiveBillingProviderWebhook
      summary: Receive a signed billing-provider event
      description: The implementation must verify the signature against the raw body.
      x-urlytix-status: planned
      security: []
      parameters:
        - name: Provider-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Event accepted or already processed
        "400":
          $ref: "#/components/responses/BadRequest"

  /workspaces/{workspaceId}/api-keys:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [API keys]
      operationId: listApiKeys
      summary: List workspace API-key metadata
      x-urlytix-status: implemented
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      tags: [API keys]
      operationId: createApiKey
      summary: Create a workspace API key
      description: The plaintext secret is returned exactly once.
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [apiKey, secret]
                properties:
                  apiKey:
                    $ref: "#/components/schemas/ApiKey"
                  secret:
                    type: string

  /workspaces/{workspaceId}/api-keys/{apiKeyId}:
    delete:
      tags: [API keys]
      operationId: revokeApiKey
      summary: Revoke an API key
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: apiKeyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/webhooks:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List workspace webhook subscriptions
      x-urlytix-status: implemented
      responses:
        "200":
          description: Webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create a webhook subscription
      description: The signing secret is returned exactly once.
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      [
                        link.created,
                        link.updated,
                        link.deleted,
                        subscription.updated,
                      ]
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [webhook, secret]
                properties:
                  webhook:
                    $ref: "#/components/schemas/Webhook"
                  secret:
                    type: string

  /workspaces/{workspaceId}/webhooks/{webhookId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/WebhookId"
    patch:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update a webhook subscription
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                active:
                  type: boolean
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook subscription
      x-urlytix-status: implemented
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/webhooks/{webhookId}/deliveries:
    get:
      tags: [Webhooks]
      operationId: listWebhookDeliveries
      summary: List recent webhook deliveries
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/WebhookId"
      responses:
        "200":
          description: Deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookDelivery"

  /workspaces/{workspaceId}/webhooks/{webhookId}/deliveries/{deliveryId}/retry:
    post:
      tags: [Webhooks]
      operationId: retryWebhookDelivery
      summary: Queue a failed delivery for retry
      x-urlytix-status: planned
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/WebhookId"
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Retry queued
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/domains:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Domains]
      operationId: listDomains
      summary: List branded domains
      x-urlytix-status: implemented
      responses:
        "200":
          description: Workspace domains
    post:
      tags: [Domains]
      operationId: createDomain
      summary: Register a branded domain
      x-urlytix-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname:
                  type: string
                  format: hostname
      responses:
        "201":
          description: Domain registered
        "409":
          $ref: "#/components/responses/Conflict"

  /workspaces/{workspaceId}/domains/{domainId}/verify:
    post:
      tags: [Domains]
      operationId: verifyDomain
      summary: Verify a branded domain TXT record
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Verification result

  /workspaces/{workspaceId}/domains/{domainId}:
    delete:
      tags: [Domains]
      operationId: deleteDomain
      summary: Remove a branded domain
      x-urlytix-status: implemented
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Domain removed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    accessCookie:
      type: apiKey
      in: cookie
      name: access_token
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  parameters:
    LinkId:
      name: linkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceIdQuery:
      name: workspaceId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    WebhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated principal lacks permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource state conflicts with the request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Service dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Health"

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, app, database, timestamp]
      properties:
        status:
          type: string
          enum: [ok, error]
        app:
          type: string
          const: Urlytix API
        database:
          type: string
          enum: [connected, disconnected]
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          minimum: 400
          maximum: 599
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 128
          description: Must include lowercase, uppercase, numeric, and symbol characters.

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
        accessToken:
          type: string
        requiresTwoFactor:
          type: boolean
        twoFactorToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    AuthSession:
      type: object
      additionalProperties: false
      required: [id, createdAt, expiresAt, current]
      properties:
        id:
          type: string
          format: uuid
        userAgent:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        current:
          type: boolean

    TokenResponse:
      type: object
      additionalProperties: false
      required: [accessToken]
      properties:
        accessToken:
          type: string

    User:
      type: object
      additionalProperties: false
      required: [id, email, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: [string, "null"]
        email:
          type: string
          format: email
        timezone:
          type: string
        locale:
          type: string
        totpEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    LinkStatus:
      type: string
      enum: [ACTIVE, DISABLED, EXPIRED]

    CreateLinkRequest:
      type: object
      additionalProperties: false
      required: [workspaceId, originalUrl]
      properties:
        workspaceId:
          type: string
          format: uuid
        originalUrl:
          type: string
          format: uri
        title:
          type: string
          maxLength: 80
        customAlias:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[a-zA-Z0-9_-]+$"
        expiresAt:
          type: string
          format: date-time
        password:
          type: string
          minLength: 4
          maxLength: 72

    UpdateLinkRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        originalUrl:
          type: string
          format: uri
        title:
          type: string
          maxLength: 80
        customAlias:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Changes the public short path. The previous short URL stops working.
        expiresAt:
          type: [string, "null"]
          format: date-time
        password:
          type: [string, "null"]
          minLength: 4
          maxLength: 72

    UnlockLinkRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 72

    UpdateLinkStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/LinkStatus"

    Link:
      type: object
      required: [id, originalUrl, shortCode, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        originalUrl:
          type: string
          format: uri
        shortCode:
          type: string
        shortUrl:
          type: string
          format: uri
        title:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/LinkStatus"
        expiresAt:
          type: [string, "null"]
          format: date-time
        hasPassword:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DailyClicks:
      type: object
      additionalProperties: false
      required: [date, clicks]
      properties:
        date:
          type: string
          format: date
        clicks:
          type: integer
          minimum: 0

    GroupedCount:
      type: object
      additionalProperties: false
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
          minimum: 0

    Click:
      type: object
      required: [id, clickedAt, deviceType, isBot]
      properties:
        id:
          type: string
          format: uuid
        clickedAt:
          type: string
          format: date-time
        country:
          type: [string, "null"]
        city:
          type: [string, "null"]
        deviceType:
          type: string
          enum: [DESKTOP, MOBILE, TABLET, BOT, UNKNOWN]
        browser:
          type: [string, "null"]
        os:
          type: [string, "null"]
        referrer:
          type: [string, "null"]
        utmSource:
          type: [string, "null"]
        utmMedium:
          type: [string, "null"]
        utmCampaign:
          type: [string, "null"]
        isBot:
          type: boolean

    AnalyticsOverview:
      type: object
      required:
        [
          totalLinks,
          totalClicks,
          clicksToday,
          dailyClicks,
          topLinks,
          recentClicks,
        ]
      properties:
        totalLinks:
          type: integer
          minimum: 0
        totalClicks:
          type: integer
          minimum: 0
        clicksToday:
          type: integer
          minimum: 0
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClicks"
        topLinks:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Link"
              - type: object
                properties:
                  totalClicks:
                    type: integer
                    minimum: 0
        recentClicks:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Click"
              - type: object
                properties:
                  link:
                    $ref: "#/components/schemas/Link"

    LinkAnalytics:
      type: object
      required:
        - link
        - uniqueVisitors
        - dailyClicks
        - deviceStats
        - browserStats
        - osStats
        - referrerStats
        - utmSourceStats
        - botStats
        - recentClicks
      properties:
        link:
          allOf:
            - $ref: "#/components/schemas/Link"
            - type: object
              properties:
                totalClicks:
                  type: integer
                  minimum: 0
        uniqueVisitors:
          type: integer
          minimum: 0
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClicks"
        deviceStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        browserStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        osStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        referrerStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        utmSourceStats:
          type: array
          items:
            $ref: "#/components/schemas/GroupedCount"
        botStats:
          type: object
          additionalProperties: false
          required: [botClicks, humanClicks]
          properties:
            botClicks:
              type: integer
              minimum: 0
            humanClicks:
              type: integer
              minimum: 0
        recentClicks:
          type: array
          items:
            $ref: "#/components/schemas/Click"

    WorkspaceRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]

    Workspace:
      type: object
      additionalProperties: false
      required: [id, name, slug, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMember"
        _count:
          type: object
          properties:
            links:
              type: integer
            memberships:
              type: integer

    WorkspaceMember:
      type: object
      additionalProperties: false
      required: [id, userId, workspaceId, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        user:
          type: object
          additionalProperties: false
          required: [id, email]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: [string, "null"]
            email:
              type: string
              format: email
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time

    Subscription:
      type: object
      additionalProperties: false
      required: [plan, status, currentPeriodEnd]
      properties:
        plan:
          type: string
          enum: [free, pro, business]
        status:
          type: string
          enum: [active, trialing, past_due, canceled, incomplete]
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean

    ApiKey:
      type: object
      additionalProperties: false
      required: [id, name, prefix, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        lastUsedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    Webhook:
      type: object
      additionalProperties: false
      required: [id, workspaceId, url, events, active, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        lastSentAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      additionalProperties: false
      required: [id, event, status, attempts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        event:
          type: string
        status:
          type: string
          enum: [pending, delivered, failed, dead_letter]
        attempts:
          type: integer
          minimum: 0
        responseStatus:
          type: [integer, "null"]
        nextAttemptAt:
          type: [string, "null"]
          format: date-time
